# OpenTelemetry Collector configuration
#
# Receivers: accept OTLP from all microservices (gRPC + HTTP)
# Processors: batch for efficiency, resource detection for host metadata
# Exporters:
#   traces  → Jaeger via OTLP
#   metrics → Prometheus scrape endpoint + Jaeger (for exemplars)
#   logs    → Seq via OTLP (future — Seq 2024+ supports OTLP)

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024
    send_batch_max_size: 2048

  memory_limiter:
    # Prevent OOM — drop spans/metrics before the collector crashes.
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64

  resource:
    attributes:
      - action: insert
        key: deployment.environment
        value: development

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: b2b
    send_timestamps: true
    metric_expiration: 5m

  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [otlp/jaeger, debug]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [prometheus]

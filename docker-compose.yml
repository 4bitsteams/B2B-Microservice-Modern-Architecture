name: b2b-microservices

services:
  # ─────────────────────────────────────────────────────────
  # API Gateway
  # ─────────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: src/Gateway/B2B.Gateway/Dockerfile
    container_name: b2b-gateway
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      identity-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      basket-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      shipping-service:
        condition: service_healthy
      vendor-service:
        condition: service_healthy
      discount-service:
        condition: service_healthy
      review-service:
        condition: service_healthy
    networks:
      - b2b-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ─────────────────────────────────────────────────────────
  # Identity Service
  # ─────────────────────────────────────────────────────────
  identity-service:
    build:
      context: .
      dockerfile: src/Services/Identity/B2B.Identity.Api/Dockerfile
    container_name: b2b-identity
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - b2b-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>B2B Platform</title>
    <base href="/" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="B2B.Web.styles.css" />
</head>
<body>
    <div id="app">
        <div class="d-flex justify-content-center align-items-center vh-100 bg-light">
            <div class="text-center">
                <div class="spinner-border text-primary mb-3" style="width:3rem;height:3rem;" role="status">
                    <span class="visually-hidden">Loading…</span>
                </div>
                <p class="text-muted">Loading B2B Platform…</p>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" class="alert alert-danger alert-dismissible position-fixed bottom-0 start-0 end-0 m-3 shadow" style="display:none;z-index:9999;">
        <strong>An unhandled error has occurred.</strong>
        <a href="" class="alert-link ms-2">Reload the page</a>
        <button type="button" class="btn-close" data-dismiss="blazor-error-ui" aria-label="Close"></button>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
